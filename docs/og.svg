  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#ffffff" stroke-opacity="0.13"/>
  <!-- wordmark -->
  <text x="88" y="128" font-size="34" font-weight="700" fill="#f1eeec">kassinao</text>
  <rect x="253" y="102" width="12" height="30" fill="#5865f2"/>
  <!-- título -->
  <text x="88" y="228" font-size="52" font-weight="700" fill="#f1eeec">Grava as calls do Discord.</text>
  <text x="88" y="296" font-size="52" font-weight="700" fill="#f1eeec">Depois é só perguntar.</text>
  <!-- sub -->
