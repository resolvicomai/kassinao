  <!-- terminal -->
  <rect x="88" y="396" width="1024" height="150" fill="#17171a" stroke="#ffffff" stroke-opacity="0.13"/>
  <circle cx="112" cy="420" r="5" fill="#ffffff" opacity="0.22"/>
  <circle cx="130" cy="420" r="5" fill="#ffffff" opacity="0.22"/>
  <circle cx="148" cy="420" r="5" fill="#ffffff" opacity="0.22"/>
  <line x1="88" y1="438" x2="1112" y2="438" stroke="#ffffff" stroke-opacity="0.13"/>
  <text x="112" y="472" font-size="20"><tspan fill="#5865f2">discord&gt;</tspan> <tspan fill="#f1eeec" font-weight="700">/perguntar</tspan> <tspan fill="#b6b4b2">o que decidimos sobre o deploy?</tspan></text>
  <text x="112" y="506" font-size="20"><tspan fill="#b6b4b2">Deploy confirmado pra quinta. Responsável: Ana —</tspan> <tspan fill="#5865f2">[16:10]</tspan></text>
  <rect x="112" y="518" width="11" height="20" fill="#f1eeec"/>
