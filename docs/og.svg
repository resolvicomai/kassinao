<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      text { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }
    </style>
  </defs>
  <!-- fundo -->
  <rect width="1200" height="630" fill="#101012"/>
