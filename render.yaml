# Deploy no Render (https://render.com) — "Blueprint".
# Botão: https://render.com/deploy?repo=https://github.com/resolvicomai/kassinao
# Preencha as variáveis marcadas como sync:false no dashboard do Render após o deploy.
services:
  - type: web
    name: kassinao
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter # precisa de um plano com processo sempre ativo (o Gateway de voz é WebSocket)
    healthCheckPath: /health
    disk:
      name: recordings
      mountPath: /app/recordings
      sizeGB: 10
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: APPLICATION_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: APP_URL
        sync: false # URL HTTPS da SUA instância, ex.: https://seu-kassinao.onrender.com
      - key: ALLOWED_GUILD_IDS
        sync: false # IDs dos seus servidores Discord, separados por vírgula
      - key: ALLOW_ALL_GUILDS
        value: 'false' # altere somente se você operar deliberadamente um bot público multi-guild
      - key: GUILD_ID
        sync: false # filtro opcional de registro; precisa estar na allowlist
      - key: TRUST_PROXY_HOPS
        value: '1' # proxy HTTPS do Render
      - key: WEB_BIND_ADDRESS
        value: 0.0.0.0 # wildcard apenas dentro do container isolado do Render
      - key: SOURCE_URL
        value: https://github.com/resolvicomai/kassinao
      - key: RECORDINGS_DIR
        value: /app/recordings
      # Seguro por padrão: grava sem enviar áudio/texto a providers externos.
      - key: TRANSCRIBE_PROVIDER
        value: none # assemblyai | groq | openai | gemini | command | none
      - key: TRANSCRIBE_FALLBACK_PROVIDER
        value: none # uma GROQ_API_KEY isolada não liga fallback
      - key: TRANSCRIBE_SEND_MEETING_CONTEXT
        value: 'false'
      - key: MINUTES_ENABLED
        value: 'false'
      # Para habilitar IA, altere os defaults acima e configure só as chaves usadas.
      - key: ASSEMBLYAI_API_KEY
        sync: false # opcional; https://www.assemblyai.com
      - key: GROQ_API_KEY
        sync: false # opcional; https://console.groq.com (ative Zero Data Retention)
      - key: OPENROUTER_API_KEY
        sync: false # opcional; https://openrouter.ai
      # Conector de IA (MCP) — opcional, mas é feature de destaque: sem MCP_SECRET
      # o /app/conectar-ia e a API /api/* ficam DESLIGADOS (opt-in deliberado).
      - key: MCP_SECRET
        sync: false # ex.: `openssl rand -hex 32` — rotacionar revoga todos os conectores
      - key: OWNER_IDS
        sync: false # IDs Discord (CSV) autorizados ao comando /mcp
      - key: DEFAULT_LOCALE
        value: en # 'pt' pra respostas de DM em português
      - key: TZ
        value: America/Sao_Paulo
