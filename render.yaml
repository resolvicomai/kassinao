# Deploy no Render (https://render.com) — "Blueprint".
# Botão: https://render.com/deploy?repo=https://github.com/resolvicomai/kassinao
# Preencha as variáveis marcadas como sync:false no dashboard do Render após o deploy.
services:
  - type: web
    name: kassinao
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter # precisa de um plano com processo sempre ativo (o Gateway de voz é WebSocket)
    healthCheckPath: /health
    disk:
      name: recordings
      mountPath: /app/recordings
      sizeGB: 10
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: APPLICATION_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: BASE_URL
        sync: false # ex.: https://kassinao.onrender.com (use a URL pública do serviço)
      - key: GUILD_ID
        sync: false
      - key: RECORDINGS_DIR
        value: /app/recordings
      # Transcrição + Ata por IA: ponha "groq" e preencha GROQ_API_KEY pra ligar (ou deixe vazio p/ só gravar).
      - key: TRANSCRIBE_PROVIDER
        sync: false # groq | openai | gemini | none
      - key: GROQ_API_KEY
        sync: false # https://console.groq.com — liga transcrição E ata (ative Zero Data Retention)
      - key: DEFAULT_LOCALE
        value: en # 'pt' pra respostas de DM em português
      - key: TZ
        value: America/Sao_Paulo
