# Deploy no Render (https://render.com) — "Blueprint".
# Botão: https://render.com/deploy?repo=https://github.com/resolvicomai/kassinao
# Preencha as variáveis marcadas como sync:false no dashboard do Render após o deploy.
services:
  - type: web
    name: kassinao
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter # precisa de um plano com processo sempre ativo (o Gateway de voz é WebSocket)
    healthCheckPath: /health
    disk:
      name: recordings
      mountPath: /app/recordings
      sizeGB: 10
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: APPLICATION_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: BASE_URL
        sync: false # ex.: https://kassinao.onrender.com; APP_URL/PUBLIC_URL/DOCS_URL/MCP_URL herdam esta origem
      - key: GUILD_ID
        sync: false
      - key: RECORDINGS_DIR
        value: /app/recordings
      # Transcrição + Ata por IA: ponha um provider e a chave correspondente (ou deixe vazio p/ só gravar).
      - key: TRANSCRIBE_PROVIDER
        sync: false # assemblyai | groq | openai | gemini | none
      - key: ASSEMBLYAI_API_KEY
        sync: false # https://www.assemblyai.com — US$50 de crédito grátis (top-3 em pt-BR)
      - key: GROQ_API_KEY
        sync: false # https://console.groq.com — transcrição free tier + fallback (ative Zero Data Retention)
      - key: OPENROUTER_API_KEY
        sync: false # https://openrouter.ai — LLM da ata (padrão google/gemini-2.5-flash)
      # Conector de IA (MCP) — opcional, mas é feature de destaque: sem MCP_SECRET
      # o /app/conectar-ia e a API /api/* ficam DESLIGADOS (opt-in deliberado).
      - key: MCP_SECRET
        sync: false # ex.: `openssl rand -hex 32` — rotacionar revoga todos os conectores
      - key: OWNER_IDS
        sync: false # IDs Discord (CSV) autorizados ao comando /mcp
      - key: DEFAULT_LOCALE
        value: en # 'pt' pra respostas de DM em português
      - key: TZ
        value: America/Sao_Paulo
