services:
  kassinao:
    # Produção consome o artefato publicado; a VPS não clona nem compila o repo.
    # Operações mais rígidas substituem a tag por image@sha256 no .env privado.
    image: ${KASSINAO_IMAGE:-kassinao-local:dev}
    pull_policy: ${KASSINAO_PULL_POLICY:-never}
    container_name: kassinao
    restart: unless-stopped
    # O processo roda sem root. Migrações de ownership usam os scripts selados;
    # nunca aplique chown -R manual em dados ou mounts de produção.
    user: '${KASSINAO_UID:-1000}:${KASSINAO_GID:-1000}'
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    ulimits:
      core:
        soft: 0
        hard: 0
    mem_limit: ${KASSINAO_MEMORY_LIMIT:-3g}
    cpus: ${KASSINAO_CPUS:-2.0}
    stop_grace_period: 45s # > soma dos tetos internos do shutdown (20s FLAC + 15s REST + margem)
    # Logs com teto: sem isso o json-file cresce até encher o disco (e o
    # disk-guard encerraria GRAVAÇÕES por causa de log).
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    # A operação oficial usa app.env separado do .env do Compose/túnel. O
    # fallback único mantém o quick start simples para instalações menores.
    env_file: ${KASSINAO_APP_ENV_FILE:-.env}
    environment:
      # O core privado nunca recebe ingress direto. O router sem segredos é o
      # único listener alcançável pelo túnel ou pelo loopback do host.
      PORT: '8082'
      WEB_BIND_ADDRESS: '0.0.0.0'
      RECORDINGS_DIR: /app/recordings
      STATE_DIR: /app/state
      AUTH_STATE_DIR: /app/auth
      # Fingerprint público da release; o bundle oficial o sela no mesmo
      # digest de KASSINAO_IMAGE e o smoke externo exige correspondência.
      KASSINAO_RELEASE_DIGEST: ${KASSINAO_RELEASE_DIGEST:-}
      KASSINAO_DEPLOYMENT_FINGERPRINT: ${KASSINAO_DEPLOYMENT_FINGERPRINT:-}
      # O .env também abastece o Compose/cloudflared. Sobrescreve no app para
      # uma RCE nele não revelar a credencial do túnel.
      TUNNEL_TOKEN: ''
      # Cache de modelos é isolado das gravações e nunca entra no expurgo/backup.
      XDG_CACHE_HOME: /home/node/.cache
    expose:
      - '8082'
    volumes:
      # Autenticação e estado nunca compartilham o volume de gravações. Quem
      # migra uma instalação antiga prepara os diretórios antes do primeiro boot.
      - ${KASSINAO_RECORDINGS_DIR:-./recordings}:/app/recordings:rw
      - ${KASSINAO_STATE_DIR:-state-data}:/app/state:rw
      - ${KASSINAO_AUTH_DIR:-auth-data}:/app/auth:rw
      - ${KASSINAO_MODEL_CACHE_DIR:-./cache}:/home/node/.cache:rw
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=1g,mode=1777
    # Auto-detecção de processo pendurado (event loop travado ≠ crash):
    # o restart:unless-stopped só reage a exit; o healthcheck marca unhealthy.
    healthcheck:
      test:
        [
          'CMD',
          '/usr/local/bin/kassinao-no-dump',
          '--preload',
          '/usr/local/lib/libkassinao-no-dump.so',
          '--',
          '/usr/local/bin/node',
          '-e',
          "fetch('http://localhost:8082/health').then((r)=>process.exit(r.ok?0:1),()=>process.exit(1))",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      core_link:
        interface_name: core0
        aliases: [kassinao-core]
      core_egress:
        interface_name: egress0
        gw_priority: 1

  # Reverse proxy de origem única. Não recebe env_file, segredo ou volume e
  # abre dois listeners explícitos: edge0 para o túnel e host0 para o único
  # publish loopback. As interfaces que alcançam core e público não aceitam
  # ingress porque o processo nunca faz bind nelas ou em 0.0.0.0.
  kassinao-router:
    image: ${KASSINAO_IMAGE:-kassinao-local:dev}
    pull_policy: ${KASSINAO_PULL_POLICY:-never}
    container_name: kassinao-router
    profiles: ['split-public']
    command: ['/usr/local/bin/node', 'dist/router.js']
    restart: unless-stopped
    user: '${KASSINAO_UID:-1000}:${KASSINAO_GID:-1000}'
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    ulimits:
      core:
        soft: 0
        hard: 0
    mem_limit: 384m
    cpus: 0.25
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '2'
    environment:
      NODE_ENV: production
      PORT: '8080'
      WEB_BIND_INTERFACE: edge0
      WEB_HOST_BIND_INTERFACE: host0
      APP_URL: ${APP_URL:-}
      MCP_URL: ${MCP_URL:-}
      PUBLIC_URL: ${PUBLIC_URL:-}
      DOCS_URL: ${DOCS_URL:-}
      KASSINAO_RELEASE_DIGEST: ${KASSINAO_RELEASE_DIGEST:-}
      KASSINAO_DEPLOYMENT_FINGERPRINT: ${KASSINAO_DEPLOYMENT_FINGERPRINT:-}
    expose:
      - '8080'
    ports:
      - '127.0.0.1:${KASSINAO_HOST_PORT:-8080}:8080'
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m,mode=1777
    healthcheck:
      test:
        [
          'CMD',
          '/usr/local/bin/kassinao-no-dump',
          '--preload',
          '/usr/local/lib/libkassinao-no-dump.so',
          '--',
          '/usr/local/bin/node',
          '-e',
          "const os=require('node:os');const ip=(os.networkInterfaces().edge0||[]).find((entry)=>entry.family==='IPv4'&&!entry.internal)?.address;if(!ip)process.exit(1);fetch('http://'+ip+':8080/_kassinao/router-health').then((r)=>process.exit(r.ok?0:1),()=>process.exit(1))",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      host_ingress:
        interface_name: host0
        gw_priority: 1
      edge_ingress:
        interface_name: edge0
        aliases: [kassinao]
      core_link:
        interface_name: core0
      public_link:
        interface_name: public0

  # Landing/docs/demo sem Discord, providers, guilds ou volumes privados. Use o
  # perfil split-public. Todo ingress passa pelo router, que decide o destino
  # usando host e caminho antes de abrir a conexão interna.
  kassinao-public:
    image: ${KASSINAO_IMAGE:-kassinao-local:dev}
    pull_policy: ${KASSINAO_PULL_POLICY:-never}
    container_name: kassinao-public
    profiles: ['split-public']
    command: ['/usr/local/bin/node', 'dist/public.js']
    restart: unless-stopped
    user: '${KASSINAO_UID:-1000}:${KASSINAO_GID:-1000}'
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    ulimits:
      core:
        soft: 0
        hard: 0
    mem_limit: 512m
    cpus: 0.50
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '2'
    environment:
      NODE_ENV: production
      PORT: '8081'
      WEB_BIND_ADDRESS: '0.0.0.0'
      PUBLIC_URL: ${PUBLIC_URL:-}
      DOCS_URL: ${DOCS_URL:-}
      SOURCE_URL: ${SOURCE_URL:-}
      KASSINAO_RELEASE_DIGEST: ${KASSINAO_RELEASE_DIGEST:-}
      KASSINAO_DEPLOYMENT_FINGERPRINT: ${KASSINAO_DEPLOYMENT_FINGERPRINT:-}
      TRUST_PROXY_HOPS: '1'
      REPO_PUBLIC: ${REPO_PUBLIC:-false}
    expose:
      - '8081'
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m,mode=1777
    healthcheck:
      test:
        [
          'CMD',
          '/usr/local/bin/kassinao-no-dump',
          '--preload',
          '/usr/local/lib/libkassinao-no-dump.so',
          '--',
          '/usr/local/bin/node',
          '-e',
          "fetch('http://localhost:8081/health',{redirect:'manual'}).then((r)=>process.exit(r.ok?0:1),()=>process.exit(1))",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      public_link:
        interface_name: public0

  # Túnel da Cloudflare: entrega https://SEU_SUBDOMINIO.SEU_DOMINIO com cadeado,
  # sem abrir portas no VPS. O TUNNEL_TOKEN vem do .env (criado no painel da Cloudflare).
  cloudflared:
    # Versão + digest multi-arquitetura: o registry não pode mover a tag por baixo
    # do deploy. Dependabot abre o update deliberado.
    image: cloudflare/cloudflared:2026.7.1@sha256:188bb03589a32affed3cf4d0590565ffe67b78866e6b5582574afab2b705bafe
    container_name: kassinao-tunnel
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    ulimits:
      core:
        soft: 0
        hard: 0
    mem_limit: 256m
    cpus: 0.50
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '2'
    restart: unless-stopped
    command: ['tunnel', '--no-autoupdate', 'run']
    # Só sobe com o perfil "tunnel" ativo — assim quem NÃO usa Cloudflare Tunnel
    # não fica com um serviço vermelho reiniciando à toa. Para ligar: ponha
    # COMPOSE_PROFILES=tunnel no .env (recomendado) ou use `--profile tunnel`.
    profiles: ['tunnel']
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - kassinao-router
    networks:
      edge_ingress:
        interface_name: edge0
      tunnel_egress:
        interface_name: egress0
        gw_priority: 1

volumes:
  state-data:
  auth-data:

networks:
  # Rede NAT interna exclusiva do router. Ela materializa a bridge usada pelo
  # publish loopback sem dar ao processo uma rota externa ou compartilhar o
  # listener do host com o túnel, core ou processo público.
  host_ingress:
    internal: true
    driver_opts:
      com.docker.network.bridge.name: kas-host0
      com.docker.network.bridge.gateway_mode_ipv4: nat
      com.docker.network.bridge.gateway_mode_ipv6: isolated
      com.docker.network.bridge.enable_icc: 'false'
  # Cloudflared enxerga somente o listener edge0 do router. O túnel não
  # compartilha rede com core/público; os links de upstream do router são
  # separados da interface de ingress.
  edge_ingress:
    internal: true
    driver_opts:
      com.docker.network.bridge.name: kas-edge0
      com.docker.network.bridge.gateway_mode_ipv4: isolated
      com.docker.network.bridge.gateway_mode_ipv6: isolated
  # O router abre conexões para os upstreams; os upstreams não alcançam a
  # interface de ingress do router nem um ao outro.
  core_link:
    internal: true
    driver_opts:
      com.docker.network.bridge.name: kas-core0
      com.docker.network.bridge.gateway_mode_ipv4: isolated
      com.docker.network.bridge.gateway_mode_ipv6: isolated
  public_link:
    internal: true
    driver_opts:
      com.docker.network.bridge.name: kas-public0
      com.docker.network.bridge.gateway_mode_ipv4: isolated
      com.docker.network.bridge.gateway_mode_ipv6: isolated
  # Egress do core e do túnel ficam em bridges exclusivas. O router e o
  # processo público não possuem rota externa.
  core_egress:
    driver_opts:
      com.docker.network.bridge.name: kas-core-eg0
      com.docker.network.bridge.enable_icc: 'false'
  tunnel_egress:
    driver_opts:
      com.docker.network.bridge.name: kas-tunnel-eg0
      com.docker.network.bridge.enable_icc: 'false'
