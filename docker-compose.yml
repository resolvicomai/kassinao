services:
  kassinao:
    # Produção consome o artefato publicado; a VPS não clona nem compila o repo.
    # Operações mais rígidas substituem a tag por image@sha256 no .env privado.
    image: ${KASSINAO_IMAGE:-kassinao-local:dev}
    pull_policy: ${KASSINAO_PULL_POLICY:-never}
    container_name: kassinao
    restart: unless-stopped
    # O processo roda sem root. Em instalação antiga, ajuste o volume uma vez:
    #   sudo chown -R ${KASSINAO_UID:-1000}:${KASSINAO_GID:-1000} recordings
    user: '${KASSINAO_UID:-1000}:${KASSINAO_GID:-1000}'
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: ${KASSINAO_MEMORY_LIMIT:-3g}
    cpus: ${KASSINAO_CPUS:-2.0}
    stop_grace_period: 45s # > soma dos tetos internos do shutdown (20s FLAC + 15s REST + margem)
    # Logs com teto: sem isso o json-file cresce até encher o disco (e o
    # disk-guard encerraria GRAVAÇÕES por causa de log).
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    # A operação oficial usa app.env separado do .env do Compose/túnel. O
    # fallback único mantém o quick start simples para instalações menores.
    env_file: ${KASSINAO_APP_ENV_FILE:-.env}
    environment:
      # Porta interna invariável: túnel, healthcheck e expose concordam.
      # KASSINAO_HOST_PORT altera somente a porta publicada no host.
      PORT: '8080'
      # Wildcard existe apenas dentro da rede isolada do container. No host, a
      # publicação abaixo continua presa a 127.0.0.1.
      WEB_BIND_ADDRESS: '0.0.0.0'
      RECORDINGS_DIR: /app/recordings
      STATE_DIR: /app/state
      AUTH_STATE_DIR: /app/auth
      # Fingerprint público da release; o bundle oficial o sela no mesmo
      # digest de KASSINAO_IMAGE e o smoke externo exige correspondência.
      KASSINAO_RELEASE_DIGEST: ${KASSINAO_RELEASE_DIGEST:-}
      KASSINAO_DEPLOYMENT_FINGERPRINT: ${KASSINAO_DEPLOYMENT_FINGERPRINT:-}
      # O .env também abastece o Compose/cloudflared. Sobrescreve no app para
      # uma RCE nele não revelar a credencial do túnel.
      TUNNEL_TOKEN: ''
      # Cache de modelos é isolado das gravações e nunca entra no expurgo/backup.
      XDG_CACHE_HOME: /home/node/.cache
    # O listener fica acessível no HOST somente por loopback. Cloudflare Tunnel
    # continua usando a rede interna; Nginx/Caddy local pode usar esta porta.
    expose:
      - '8080'
    ports:
      - '127.0.0.1:${KASSINAO_HOST_PORT:-8080}:8080'
    volumes:
      # Autenticação e estado nunca compartilham o volume de gravações. Quem
      # migra uma instalação antiga prepara os diretórios antes do primeiro boot.
      - ${KASSINAO_RECORDINGS_DIR:-./recordings}:/app/recordings:rw
      - ${KASSINAO_STATE_DIR:-state-data}:/app/state:rw
      - ${KASSINAO_AUTH_DIR:-auth-data}:/app/auth:rw
      - ${KASSINAO_MODEL_CACHE_DIR:-./cache}:/home/node/.cache:rw
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=1g,mode=1777
    # Auto-detecção de processo pendurado (event loop travado ≠ crash):
    # o restart:unless-stopped só reage a exit; o healthcheck marca unhealthy.
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:8080/health').then((r)=>process.exit(r.ok?0:1),()=>process.exit(1))",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks: [private]

  # Landing/docs/demo sem Discord, providers, guilds ou volumes privados. Use o
  # perfil split-public e roteie os hosts públicos para kassinao-public:8081.
  # O processo recusa iniciar se qualquer segredo for injetado por engano.
  kassinao-public:
    image: ${KASSINAO_IMAGE:-kassinao-local:dev}
    pull_policy: ${KASSINAO_PULL_POLICY:-never}
    container_name: kassinao-public
    profiles: ['split-public']
    command: ['node', 'dist/public.js']
    restart: unless-stopped
    user: '${KASSINAO_UID:-1000}:${KASSINAO_GID:-1000}'
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    cpus: 0.50
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '2'
    environment:
      NODE_ENV: production
      PORT: '8081'
      WEB_BIND_ADDRESS: '0.0.0.0'
      PUBLIC_URL: ${PUBLIC_URL:-}
      DOCS_URL: ${DOCS_URL:-}
      SOURCE_URL: ${SOURCE_URL:-}
      KASSINAO_RELEASE_DIGEST: ${KASSINAO_RELEASE_DIGEST:-}
      KASSINAO_DEPLOYMENT_FINGERPRINT: ${KASSINAO_DEPLOYMENT_FINGERPRINT:-}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-0}
      REPO_PUBLIC: ${REPO_PUBLIC:-false}
    expose:
      - '8081'
    ports:
      # Host proxies (Caddy/Nginx) podem alcançar somente por loopback. O túnel
      # usa a rede Docker e não depende desta publicação.
      - '127.0.0.1:${KASSINAO_PUBLIC_HOST_PORT:-8081}:8081'
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m,mode=1777
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:8081/health',{redirect:'manual'}).then((r)=>process.exit(r.ok?0:1),()=>process.exit(1))",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks: [public]

  # Túnel da Cloudflare: entrega https://SEU_SUBDOMINIO.SEU_DOMINIO com cadeado,
  # sem abrir portas no VPS. O TUNNEL_TOKEN vem do .env (criado no painel da Cloudflare).
  cloudflared:
    # Versão + digest multi-arquitetura: o registry não pode mover a tag por baixo
    # do deploy. Dependabot abre o update deliberado.
    image: cloudflare/cloudflared:2026.7.1@sha256:188bb03589a32affed3cf4d0590565ffe67b78866e6b5582574afab2b705bafe
    container_name: kassinao-tunnel
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    mem_limit: 256m
    cpus: 0.50
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '2'
    restart: unless-stopped
    command: ['tunnel', '--no-autoupdate', 'run']
    # Só sobe com o perfil "tunnel" ativo — assim quem NÃO usa Cloudflare Tunnel
    # não fica com um serviço vermelho reiniciando à toa. Para ligar: ponha
    # COMPOSE_PROFILES=tunnel no .env (recomendado) ou use `--profile tunnel`.
    profiles: ['tunnel']
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - kassinao
    networks: [private, public]

volumes:
  state-data:
  auth-data:

networks:
  # Containers público e privado nunca compartilham uma rede. Somente o
  # cloudflared, sem volumes nem privilégios, alcança os dois adapters.
  private:
    driver_opts:
      # Nome estável: as regras host-side já protegem a interface antes mesmo
      # do primeiro start e continuam válidas quando o Compose recria a rede.
      com.docker.network.bridge.name: kas-private0
  # Landing/docs não precisam iniciar conexões externas. O túnel também está
  # na rede private e preserva seu egress por ela.
  public:
    internal: true
    driver_opts:
      com.docker.network.bridge.name: kas-public0
      com.docker.network.bridge.gateway_mode_ipv4: isolated
      com.docker.network.bridge.gateway_mode_ipv6: isolated
