name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Token com o mínimo necessário; jobs pedem mais só se precisarem.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions pinadas em SHA (imutável) — tag @v4 poderia ser movida por um atacante.
      # O comentário mantém a versão legível; o Dependabot (github-actions) atualiza o SHA.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Review dependency changes
        if: github.event_name == 'pull_request' && github.event.repository.private == false
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            mcp/npm-shrinkwrap.json
      - name: Install root dependencies
        run: npm ci
      - name: Audit root dependencies
        run: npm audit --audit-level=high
      - name: Verify root dependency signatures
        run: npm audit signatures
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
      # o conector MCP é um pacote separado — sem este step, mcp/ quebrado passaria verde
      - name: Install MCP dependencies
        run: npm ci
        working-directory: mcp
      - name: Audit MCP dependencies
        run: npm audit --audit-level=high
        working-directory: mcp
      - name: Verify MCP dependency signatures
        run: npm audit signatures
        working-directory: mcp
      - name: Build MCP connector
        run: npm run build
        working-directory: mcp
      - name: Docker build with locked local transcriber
        run: docker build --build-arg LOCAL_TRANSCRIBE=1 -t kassinao:ci .
      - name: Smoke-test local transcriber dependencies
        run: docker run --rm --entrypoint python3 kassinao:ci -c "import faster_whisper"
