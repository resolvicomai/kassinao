name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Token com o mínimo necessário; jobs pedem mais só se precisarem.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions pinadas em SHA (imutável) — tag @v4 poderia ser movida por um atacante.
      # O comentário mantém a versão legível; o Dependabot (github-actions) atualiza o SHA.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
      - name: Docker build (dry-run)
        run: docker build -t kassinao:ci .
