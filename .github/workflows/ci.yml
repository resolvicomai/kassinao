name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Token com o mínimo necessário; jobs pedem mais só se precisarem.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions pinadas em SHA (imutável) — tag @v4 poderia ser movida por um atacante.
      # O comentário mantém a versão legível; o Dependabot (github-actions) atualiza o SHA.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
      # o conector MCP é um pacote separado — sem este step, mcp/ quebrado passaria verde
      - name: Build MCP connector
        run: npm ci && npm run build
        working-directory: mcp
      - name: Docker build (dry-run)
        run: docker build -t kassinao:ci .
