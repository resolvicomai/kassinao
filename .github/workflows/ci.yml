name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Token com o mínimo necessário; jobs pedem mais só se precisarem.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_BUILD_FROM_SOURCE: 'true'
      NPM_CONFIG_OMIT: 'peer'
    steps:
      # Actions pinadas em SHA (imutável) — tag @v4 poderia ser movida por um atacante.
      # O comentário mantém a versão legível; o Dependabot (github-actions) atualiza o SHA.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Review dependency changes
        if: github.event_name == 'pull_request' && github.event.repository.private == false
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            mcp/npm-shrinkwrap.json
      - name: Install root dependencies
        run: npm ci
      - name: Verify native addons are built from signed npm sources
        run: |
          test "$(npm config get build-from-source)" = "true"
          test "$(npm config get omit)" = "peer"
          test ! -e node_modules/ffmpeg-static
      - name: Audit root dependencies
        run: npm audit --audit-level=high
      - name: Verify root dependency signatures
        run: npm audit signatures
      # /tmp é deliberadamente recusado pelos controles com PrivateTmp=true.
      - name: Prepare persistent-path storage fixtures
        run: sudo install -d -m 0700 -o "$(id -u)" -g "$(id -g)" /srv/kassinao-ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
        env:
          KASSINAO_TEST_STORAGE_ROOT: /srv/kassinao-ci
      - run: npm run build
      - run: npm run typecheck:preview
      - name: Validate the exact dedicated and shared Compose models
        env:
          KASSINAO_IMAGE: kassinao:ci
          KASSINAO_APP_ENV_FILE: /dev/null
          KASSINAO_UID: '61050'
          KASSINAO_GID: '61050'
          KASSINAO_DATA_ROOT: /tmp/kassinao-ci-data
          KASSINAO_SHARED_APP_ENV_FILE: /tmp/kassinao-ci-app.env
          KASSINAO_SHARED_TUNNEL_TOKEN_FILE: /tmp/kassinao-ci-tunnel-token
          KASSINAO_CORE_MEMORY_LIMIT: 2g
          KASSINAO_CORE_CPUS: '1.0'
          KASSINAO_ROUTER_MEMORY_LIMIT: 256m
          KASSINAO_ROUTER_CPUS: '0.1'
          KASSINAO_PUBLIC_MEMORY_LIMIT: 384m
          KASSINAO_PUBLIC_CPUS: '0.2'
          KASSINAO_TUNNEL_MEMORY_LIMIT: 192m
          KASSINAO_TUNNEL_CPUS: '0.2'
          APP_URL: http://localhost:8080
          MCP_URL: http://localhost:8080
          PUBLIC_URL: http://localhost:8080
          DOCS_URL: http://localhost:8080
          SOURCE_URL: https://github.com/resolvicomai/kassinao
          COMPOSE_PROFILES: split-public
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.shared.yml config --quiet
      # o conector MCP é um pacote separado — sem este step, mcp/ quebrado passaria verde
      - name: Install MCP dependencies
        run: npm ci
        working-directory: mcp
      - name: Audit MCP dependencies
        run: npm audit --audit-level=high
        working-directory: mcp
      - name: Verify MCP dependency signatures
        run: npm audit signatures
        working-directory: mcp
      - name: Build MCP connector
        run: npm run build
        working-directory: mcp
      - name: Docker build with locked local transcriber
        run: docker build --build-arg LOCAL_TRANSCRIBE=1 -t kassinao:ci .
      - name: Smoke-test public process through the default image entrypoint
        run: bash scripts/smoke-public-image.sh kassinao:ci sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      - name: Smoke-test the isolated single-origin router topology
        run: bash scripts/smoke-router-image.sh kassinao:ci sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa linux/amd64
      - name: Smoke-test local transcriber dependencies
        run: docker run --rm --entrypoint python3 kassinao:ci -c "import faster_whisper"
