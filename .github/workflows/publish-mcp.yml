name: Publish MCP

on:
  push:
    tags:
      - 'mcp-v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-mcp-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 15
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - name: Match the tag to package.json
        run: |
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "The release tag must point to a commit already on main" >&2
            exit 1
          }
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json')).version")"
          test "$GITHUB_REF_NAME" = "mcp-v$version" || {
            echo "Tag $GITHUB_REF_NAME does not match mcp/package.json version $version" >&2
            exit 1
          }
          if npm view "kassinao-mcp@$version" version >/dev/null 2>&1; then
            echo "kassinao-mcp@$version already exists on npm" >&2
            exit 1
          fi
          node -e 'const [major, minor] = process.argv[1].split(".").map(Number); if (major < 11 || (major === 11 && minor < 5)) { throw new Error("npm >= 11.5 is required for Trusted Publishing") }' "$(npm --version)"
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high
      - run: npm audit signatures
      - run: npm run build
      - run: npm pack --dry-run
      # npm Trusted Publishing must trust this repo, workflow and `npm`
      # environment. No long-lived NPM_TOKEN is stored or injected here.
      - run: npm publish --access public --provenance
