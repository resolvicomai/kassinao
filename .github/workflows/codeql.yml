name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # varredura semanal mesmo sem commits (segunda 03:27 UTC)
    - cron: '27 3 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (JS/TS)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # publica os resultados na aba Security
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3
