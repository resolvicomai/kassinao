name: Publish app image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: publish-image-${{ github.repository }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NPM_CONFIG_BUILD_FROM_SOURCE: 'true'
      NPM_CONFIG_OMIT: 'peer'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install the Docker Engine used by Compose and image smokes
        uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5.3.0
        with:
          version: v29.6.1

      - name: Require the production Docker and Compose minimums
        run: |
          set -euo pipefail
          engine_version="$(docker version --format '{{.Server.Version}}')"
          compose_version="$(docker compose version --short)"
          python3 - "$engine_version" "$compose_version" <<'PY'
          import re
          import sys

          def version(raw):
              match = re.match(r'^v?(\d+)\.(\d+)\.(\d+)', raw)
              if not match:
                  raise SystemExit(1)
              return tuple(map(int, match.groups()))

          if version(sys.argv[1]) < (28, 1, 0) or version(sys.argv[2]) < (2, 36, 0):
              raise SystemExit('Docker Engine 28.1.0+ and Docker Compose 2.36.0+ are required')
          PY

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Require an externally verified immutable-release policy
        env:
          IMMUTABLE_RELEASES_ENABLED: ${{ vars.IMMUTABLE_RELEASES_ENABLED }}
          RELEASE_TAG_RULESET_ENABLED: ${{ vars.RELEASE_TAG_RULESET_ENABLED }}
        run: |
          set -euo pipefail
          test "$IMMUTABLE_RELEASES_ENABLED" = true || {
            echo 'Repository variable IMMUTABLE_RELEASES_ENABLED must be true only after an administrator verifies the live repository setting.' >&2
            exit 1
          }
          test "$RELEASE_TAG_RULESET_ENABLED" = true || {
            echo 'Repository variable RELEASE_TAG_RULESET_ENABLED must be true only after an administrator restricts creation of v* tags and blocks their update/deletion; MCP uses its own mcp-v* gate.' >&2
            exit 1
          }

      - name: Match the release tag to package.json and main
        id: release
        run: |
          set -euo pipefail
          tag_oid="$(git rev-parse "$GITHUB_REF")"
          release_commit="$(git rev-parse "$GITHUB_REF^{commit}")"
          main_commit="$(git rev-parse origin/main^{commit})"
          test "$release_commit" = "$main_commit" || {
            echo "The image tag must point to the exact reviewed head of main" >&2
            exit 1
          }

          version="$(node -p "require('./package.json').version")"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]] || {
            echo "package.json must use SemVer without build metadata" >&2
            exit 1
          }
          test "$GITHUB_REF_NAME" = "v$version" || {
            echo "Tag $GITHUB_REF_NAME does not match package.json $version" >&2
            exit 1
          }

          printf 'version=%s\ntag_oid=%s\nrelease_commit=%s\n' "$version" "$tag_oid" "$release_commit" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            printf 'stable=false\n' >> "$GITHUB_OUTPUT"
          else
            printf 'stable=true\nminor=%s\n' "${version%.*}" >> "$GITHUB_OUTPUT"
          fi

      - name: Require the reviewed MCP release before publishing the app
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        run: |
          set -euo pipefail
          package="$(node -p "require('./mcp/package.json').name")"
          version="$(node -p "require('./mcp/package.json').version")"
          mcp_ref="refs/tags/mcp-v$version"
          release_commit="${{ steps.release.outputs.release_commit }}"
          local_tag_oid="$(git rev-parse "$mcp_ref")"
          test "$(git cat-file -t "$local_tag_oid")" = tag || {
            echo "$mcp_ref must be an annotated release tag" >&2
            exit 1
          }
          mcp_commit="$(node scripts/verify-app-release-mcp.cjs "$mcp_ref" "$release_commit")"
          remote_tag_oids="$(git ls-remote --refs origin "$mcp_ref" | awk '{print $1}')"
          test "$(wc -w <<< "$remote_tag_oids")" -eq 1 \
            && test "$remote_tag_oids" = "$local_tag_oid" || {
              echo "Remote $mcp_ref does not match the immutable local tag" >&2
              exit 1
            }

          metadata="$RUNNER_TEMP/$package-$version.metadata.json"
          attestations="$RUNNER_TEMP/$package-$version.attestations.json"
          audit_root="$(mktemp -d)"
          trap 'rm -rf -- "$audit_root" "$metadata" "$attestations"' EXIT
          umask 077

          for attempt in 1 2 3 4 5; do
            if npm view "$package@$version" version dist --json >"$metadata" 2>/dev/null \
              && curl --proto '=https' --tlsv1.2 --fail --silent --show-error \
                "https://registry.npmjs.org/-/npm/v1/attestations/$package@$version" >"$attestations"; then
              break
            fi
            rm -f -- "$metadata" "$attestations"
            sleep "$((attempt * 3))"
          done

          test -s "$metadata" && test -s "$attestations" || {
            echo "$package@$version is not yet available with npm attestations; publish mcp-v$version first" >&2
            exit 1
          }
          npm install --ignore-scripts --no-audit --no-fund --prefix "$audit_root" "$package@$version"
          npm audit signatures --prefix "$audit_root"
          node scripts/verify-npm-release-attestation.cjs \
            "$metadata" "$attestations" "$package" "$version" \
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" '.github/workflows/publish-mcp.yml' \
            "$mcp_ref" "$mcp_commit"

      - name: Gate the release on the audited source tree
        run: |
          # /tmp é deliberadamente recusado pelos controles com PrivateTmp=true.
          sudo install -d -m 0700 -o "$(id -u)" -g "$(id -g)" /srv/kassinao-ci
          npm ci
          npm audit --audit-level=high
          npm audit signatures
          npm run lint
          npm run format:check
          KASSINAO_TEST_STORAGE_ROOT=/srv/kassinao-ci npm test
          npm run build
          npm run typecheck:preview

      - name: Validate the exact dedicated and shared Compose models
        env:
          KASSINAO_IMAGE: kassinao:release-check
          KASSINAO_APP_ENV_FILE: /dev/null
          KASSINAO_UID: '61050'
          KASSINAO_GID: '61050'
          KASSINAO_DATA_ROOT: /tmp/kassinao-release-data
          KASSINAO_SHARED_APP_ENV_FILE: /tmp/kassinao-release-app.env
          KASSINAO_SHARED_TUNNEL_TOKEN_FILE: /tmp/kassinao-release-tunnel-token
          KASSINAO_CORE_MEMORY_LIMIT: 2g
          KASSINAO_CORE_CPUS: '1.0'
          KASSINAO_ROUTER_MEMORY_LIMIT: 256m
          KASSINAO_ROUTER_CPUS: '0.1'
          KASSINAO_PUBLIC_MEMORY_LIMIT: 384m
          KASSINAO_PUBLIC_CPUS: '0.2'
          KASSINAO_TUNNEL_MEMORY_LIMIT: 192m
          KASSINAO_TUNNEL_CPUS: '0.2'
          APP_URL: http://localhost:8080
          MCP_URL: http://localhost:8080
          PUBLIC_URL: http://localhost:8080
          DOCS_URL: http://localhost:8080
          SOURCE_URL: https://github.com/resolvicomai/kassinao
          COMPOSE_PROFILES: split-public
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.shared.yml config --quiet

      - name: Install QEMU emulators before creating the multi-platform builder
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: arm64
          image: docker.io/tonistiigi/binfmt:qemu-v10.2.3-68@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit:v0.30.0@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Log in to GHCR with the ephemeral workflow token
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata for the commit-addressed candidate
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - name: Reuse only a candidate attested by this release workflow
        id: candidate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          candidate="$image:sha-$GITHUB_SHA"
          signer="${GITHUB_SERVER_URL#https://}/$GITHUB_REPOSITORY/.github/workflows/publish-image.yml"

          manifest="$(docker buildx imagetools inspect "$candidate" --format '{{json .Manifest}}' 2>/dev/null)" || {
            echo 'reuse=false' >> "$GITHUB_OUTPUT"
            exit 0
          }
          digest="$(jq -er '.digest | select(type == "string" and test("^sha256:[0-9a-f]{64}$"))' <<< "$manifest")"

          if gh attestation verify "oci://$image@$digest" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$signer" \
            --source-ref "$GITHUB_REF" \
            --source-digest "$GITHUB_SHA" \
            --deny-self-hosted-runners >/dev/null; then
            printf 'reuse=true\ndigest=%s\n' "$digest" >> "$GITHUB_OUTPUT"
          else
            echo 'The SHA tag exists without acceptable provenance; rebuilding it' >&2
            echo 'reuse=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish the exact source revision
        if: steps.candidate.outputs.reuse != 'true'
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Select and validate the candidate digest
        id: image
        run: |
          set -euo pipefail
          if [[ "${{ steps.candidate.outputs.reuse }}" == 'true' ]]; then
            digest="${{ steps.candidate.outputs.digest }}"
          else
            digest="${{ steps.push.outputs.digest }}"
          fi
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
            echo "Invalid image digest: $digest" >&2
            exit 1
          }

          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          candidate="$image:sha-$GITHUB_SHA"
          manifest="$(docker buildx imagetools inspect "$candidate" --format '{{json .Manifest}}')"
          actual="$(jq -er '.digest | select(type == "string" and test("^sha256:[0-9a-f]{64}$"))' <<< "$manifest")"
          test "$actual" = "$digest" || {
            echo "Candidate tag resolved to $actual, expected $digest" >&2
            exit 1
          }
          jq -e '
            ([.manifests[]?
              | select(.platform.os == "linux")
              | .platform.architecture] | unique) as $platforms
            | ($platforms | index("amd64")) != null
              and ($platforms | index("arm64")) != null
          ' <<< "$manifest" >/dev/null || {
            echo 'Candidate image is missing linux/amd64 or linux/arm64' >&2
            exit 1
          }
          printf 'digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"

      - name: Bind a new OCI digest to this repository and workflow
        if: steps.candidate.outputs.reuse != 'true'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

      - name: Verify the exact OCI digest before promotion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          digest="${{ steps.image.outputs.digest }}"
          signer="${GITHUB_SERVER_URL#https://}/$GITHUB_REPOSITORY/.github/workflows/publish-image.yml"

          for attempt in 1 2 3 4 5; do
            if gh attestation verify "oci://$image@$digest" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer" \
              --source-ref "$GITHUB_REF" \
              --source-digest "$GITHUB_SHA" \
              --deny-self-hosted-runners >/dev/null; then
              exit 0
            fi
            sleep "$((attempt * 3))"
          done
          echo "Could not verify provenance for $image@$digest" >&2
          exit 1

      - name: Prove anonymous pulls and hardened runtime behavior
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.image.outputs.digest }}"
          repository="${image%@*}"
          anonymous_config="$(mktemp -d)"
          trap 'rm -rf -- "$anonymous_config"' EXIT

          # DOCKER_CONFIG carries both registry credentials and the selected
          # context. Pointing it at an empty directory without preserving the
          # endpoint silently falls back to the runner's preinstalled daemon,
          # while setup-docker-action uses a separate daemon. Keep every
          # anonymous pull and runtime proof on the audited daemon explicitly.
          runtime_docker_context="$(docker context show)"
          test "$runtime_docker_context" = setup-docker-action || {
            echo "The audited setup-docker-action context is not selected" >&2
            exit 1
          }
          runtime_docker_id="$(docker info --format '{{ .ID }}')"
          test -n "$runtime_docker_id"
          runtime_docker_host="$(docker context inspect "$runtime_docker_context" --format '{{ .Endpoints.docker.Host }}')"
          case "$runtime_docker_host" in
            unix:///*) ;;
            *)
              echo "The audited Docker context must use a Unix socket" >&2
              exit 1
              ;;
          esac
          test -S "${runtime_docker_host#unix://}" || {
            echo "The audited Docker socket is unavailable" >&2
            exit 1
          }
          export DOCKER_CONFIG="$anonymous_config"
          export DOCKER_HOST="$runtime_docker_host"
          test "$(docker info --format '{{ .ID }}')" = "$runtime_docker_id" || {
            echo "The anonymous runtime proof switched Docker daemons" >&2
            exit 1
          }

          manifest="$(docker buildx imagetools inspect "$image" --format '{{json .Manifest}}')"
          platform_digest() {
            local architecture="$1"
            jq -er --arg architecture "$architecture" '
              [.manifests[]?
                | select(.platform.os == "linux" and .platform.architecture == $architecture)
                | .digest]
              | unique
              | if length == 1 then .[0] else error("expected exactly one Linux manifest") end
              | select(type == "string" and test("^sha256:[0-9a-f]{64}$"))
            ' <<< "$manifest"
          }
          amd64_image="$repository@$(platform_digest amd64)"
          arm64_image="$repository@$(platform_digest arm64)"

          docker pull --platform linux/amd64 "$amd64_image" >/dev/null

          docker run --rm --platform linux/amd64 --network none --read-only --user 1000:1000 \
            --cap-drop ALL --security-opt no-new-privileges \
            --tmpfs /tmp:rw,noexec,nosuid,nodev,size=16m \
            --entrypoint node "$amd64_image" -e '
              const fs = require("node:fs");
              if (process.getuid?.() === 0) process.exit(10);
              fs.accessSync("/app/dist/index.js", fs.constants.R_OK);
              for (const path of [
                "/usr/local/lib/node_modules/npm",
                "/usr/local/lib/node_modules/corepack",
                "/usr/local/bin/npm",
                "/usr/local/bin/npx",
                "/usr/local/bin/corepack",
                "/usr/local/bin/yarn",
                "/usr/local/bin/yarnpkg",
                "/usr/local/bin/pnpm",
                "/usr/local/bin/pnpx",
              ]) {
                try { fs.lstatSync(path); process.exit(12); }
                catch (error) { if (error?.code !== "ENOENT") throw error; }
              }
              if (fs.existsSync("/opt") && fs.readdirSync("/opt").some((entry) => entry.startsWith("yarn-"))) process.exit(13);
              try { fs.writeFileSync("/app/runtime-write", "blocked"); process.exit(11); }
              catch (error) { if (error?.code !== "EROFS") throw error; }
              fs.writeFileSync("/tmp/runtime-write", "ok");
            '
          docker pull --platform linux/arm64 "$arm64_image" >/dev/null

          prove_no_dump_runtime() {
            local platform="$1" reference="$2"
            docker run --rm --platform "$platform" --network none --read-only --user 1000:1000 \
              --cap-drop ALL --security-opt no-new-privileges \
              --entrypoint /usr/local/bin/kassinao-no-dump "$reference" \
              --preload /usr/local/lib/libkassinao-no-dump.so -- /usr/local/bin/node -e '
                const fs = require("node:fs");
                if (process.env.KASSINAO_NO_DUMP_ACTIVE !== `prctl-v1:${process.pid}`) process.exit(21);
                if (parseInt(fs.readFileSync("/proc/self/coredump_filter", "utf8"), 16) !== 0) process.exit(22);
              '
          }
          prove_no_dump_runtime linux/amd64 "$amd64_image"
          prove_no_dump_runtime linux/arm64 "$arm64_image"

          bash scripts/smoke-public-image.sh "$amd64_image" "${image#*@}" linux/amd64
          bash scripts/smoke-public-image.sh "$arm64_image" "${image#*@}" linux/arm64
          bash scripts/smoke-router-image.sh "$amd64_image" "${image#*@}" linux/amd64
          bash scripts/smoke-router-image.sh "$arm64_image" "${image#*@}" linux/arm64

          extract_no_dump_runtime() {
            local platform="$1" architecture="$2" reference="$3" destination="dist/native-runtime/linux-$2"
            local container
            mkdir -p "$destination"
            container="$(docker create --platform "$platform" --entrypoint /usr/local/bin/kassinao-no-dump "$reference" --check-current)"
            docker cp "$container:/usr/local/bin/kassinao-no-dump" "$destination/kassinao-no-dump" || {
              docker rm -f "$container" >/dev/null 2>&1 || true
              return 1
            }
            docker cp "$container:/usr/local/lib/libkassinao-no-dump.so" "$destination/libkassinao-no-dump.so" || {
              docker rm -f "$container" >/dev/null 2>&1 || true
              return 1
            }
            docker rm "$container" >/dev/null
            chmod 0555 "$destination/kassinao-no-dump"
            chmod 0444 "$destination/libkassinao-no-dump.so"
          }
          extract_no_dump_runtime linux/amd64 amd64 "$amd64_image"
          extract_no_dump_runtime linux/arm64 arm64 "$arm64_image"

      - name: Prepare image-security reports
        run: mkdir -p dist/release

      - name: Scan the final amd64 image for fixable high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.image.outputs.digest }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: json
          output: dist/release/trivy-image-${{ github.ref_name }}-linux-amd64.json
          version: v0.70.0

      - name: Scan the final arm64 image for fixable high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.image.outputs.digest }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: json
          output: dist/release/trivy-image-${{ github.ref_name }}-linux-arm64.json
          version: v0.70.0
          skip-setup-trivy: true

      - name: Build the operations-only bundle without application source code
        run: |
          ./scripts/package-ops-bundle.sh \
            "$GITHUB_REF_NAME" \
            dist/release \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.image.outputs.digest }}" \
            dist/native-runtime

      - name: Check whether this exact operations bundle is already attested
        id: bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          archive="dist/release/kassinao-ops-$GITHUB_REF_NAME.tar.gz"
          checksum="$archive.sha256"
          signer="${GITHUB_SERVER_URL#https://}/$GITHUB_REPOSITORY/.github/workflows/publish-image.yml"
          (cd "$(dirname "$checksum")" && sha256sum -c "$(basename "$checksum")")

          if gh attestation verify "$archive" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$signer" \
            --source-ref "$GITHUB_REF" \
            --source-digest "$GITHUB_SHA" \
            --deny-self-hosted-runners >/dev/null; then
            echo 'reuse=true' >> "$GITHUB_OUTPUT"
          else
            echo 'reuse=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Attest the operations bundle
        if: steps.bundle.outputs.reuse != 'true'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/release/kassinao-ops-${{ github.ref_name }}.tar.gz

      - name: Verify the operations bundle provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          archive="dist/release/kassinao-ops-$GITHUB_REF_NAME.tar.gz"
          signer="${GITHUB_SERVER_URL#https://}/$GITHUB_REPOSITORY/.github/workflows/publish-image.yml"

          for attempt in 1 2 3 4 5; do
            if gh attestation verify "$archive" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer" \
              --source-ref "$GITHUB_REF" \
              --source-digest "$GITHUB_SHA" \
              --deny-self-hosted-runners >/dev/null; then
              exit 0
            fi
            sleep "$((attempt * 3))"
          done
          echo "Could not verify provenance for $archive" >&2
          exit 1

      - name: Promote the verified digest to the exact version tag
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          digest="${{ steps.image.outputs.digest }}"
          version="${{ steps.release.outputs.version }}"

          inspect_digest() {
            local manifest
            manifest="$(docker buildx imagetools inspect "$1" --format '{{json .Manifest}}' 2>/dev/null)" || return 1
            jq -er '.digest | select(type == "string" and test("^sha256:[0-9a-f]{64}$"))' <<< "$manifest"
          }
          promote() {
            local tag="$1"
            local current
            if current="$(inspect_digest "$image:$tag")" && [[ "$current" == "$digest" ]]; then
              return 0
            fi
            docker buildx imagetools create --tag "$image:$tag" "$image@$digest"
            current="$(inspect_digest "$image:$tag")"
            test "$current" = "$digest" || {
              echo "$image:$tag resolved to $current after promotion, expected $digest" >&2
              exit 1
            }
          }

          exact_error="$(mktemp)"
          if exact_manifest="$(docker buildx imagetools inspect "$image:$version" --format '{{json .Manifest}}' 2>"$exact_error")"; then
            current="$(jq -er '.digest | select(type == "string" and test("^sha256:[0-9a-f]{64}$"))' <<< "$exact_manifest")"
            test "$current" = "$digest" || {
              echo "Refusing to overwrite immutable tag $image:$version ($current)" >&2
              rm -f -- "$exact_error"
              exit 1
            }
          elif grep -Eqi '(manifest unknown|name unknown|not found|404)' "$exact_error"; then
            promote "$version"
          else
            echo "Could not safely determine whether immutable tag $image:$version exists" >&2
            cat "$exact_error" >&2
            rm -f -- "$exact_error"
            exit 1
          fi
          rm -f -- "$exact_error"

      - name: Publish one immutable release after both assets are complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          archive="dist/release/kassinao-ops-$tag.tar.gz"
          checksum="$archive.sha256"
          digest="${{ steps.image.outputs.digest }}"
          version="${{ steps.release.outputs.version }}"
          notes_file="$(mktemp)"

          awk -v heading="## [$version]" '
            index($0, heading) == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > "$notes_file"
          test -s "$notes_file" || {
            echo "CHANGELOG.md has no release notes for $version" >&2
            exit 1
          }
          printf '\n---\n\nImagem OCI multiarch por digest: `%s@%s`.\n\n%s\n' \
            "$REGISTRY/$IMAGE_NAME" \
            "$digest" \
            'O kit operacional não contém checkout Git, código-fonte da aplicação nem credenciais; ele contém controles operacionais públicos selados, templates sem segredos e runtimes nativos. Verifique checksum e attestations antes do deploy. A imagem final passou pelo gate Trivy atual em amd64 e arm64.' \
            >> "$notes_file"

          remote_tag_oids="$(git ls-remote --refs origin "$GITHUB_REF" | awk '{print $1}')"
          test "$(wc -w <<< "$remote_tag_oids")" -eq 1 \
            && test "$remote_tag_oids" = "${{ steps.release.outputs.tag_oid }}" || {
              echo "Remote tag $GITHUB_REF changed during the release run" >&2
              exit 1
            }

          if ! gh release view "$tag" >/dev/null 2>&1; then
            create_args=(
              release create "$tag"
              --draft
              --verify-tag
              --title "Kassinão $tag"
              --notes-file "$notes_file"
            )
            if [[ "${{ steps.release.outputs.stable }}" != 'true' ]]; then
              create_args+=(--prerelease)
            fi
            gh "${create_args[@]}"
          fi

          release_state="$(gh release view "$tag" --json isDraft,isImmutable --jq '[.isDraft,.isImmutable] | @tsv')"
          is_draft="${release_state%%$'\t'*}"
          is_immutable="${release_state##*$'\t'}"
          if [[ "$is_draft" != 'true' && "$is_immutable" != 'true' ]]; then
            gh release edit "$tag" --draft
            repaired="$(gh release view "$tag" --json isDraft --jq .isDraft)"
            [[ "$repaired" == 'true' ]] || {
              echo "Existing release $tag is public, mutable, and could not be returned to draft" >&2
              exit 1
            }
            is_draft=true
          fi
          if [[ "$is_draft" == 'true' ]]; then
            gh release edit "$tag" --notes-file "$notes_file"
          fi

          verify_uploaded_asset() {
            local asset="$1"
            local name
            local download_dir
            name="$(basename "$asset")"
            download_dir="$(mktemp -d)"
            gh release download "$tag" --pattern "$name" --dir "$download_dir"
            cmp --silent "$asset" "$download_dir/$name" || {
              echo "Release asset $name differs from the locally verified artifact" >&2
              rm -rf -- "$download_dir"
              return 1
            }
            rm -rf -- "$download_dir"
          }

          expected_assets="$(printf '%s\n' \
            "$(basename "$archive")" \
            "$(basename "$checksum")" | sort)"
          current_assets="$(gh release view "$tag" --json assets --jq '.assets[].name' | sort)"
          extra_assets="$(comm -13 <(printf '%s\n' "$expected_assets") <(printf '%s\n' "$current_assets"))"
          if [[ -n "$extra_assets" ]]; then
            [[ "$is_draft" == 'true' ]] || {
              echo "Immutable release $tag contains unexpected assets" >&2
              exit 1
            }
            while IFS= read -r extra; do
              [[ -z "$extra" ]] || gh release delete-asset "$tag" "$extra" --yes
            done <<< "$extra_assets"
          fi

          for asset in "$archive" "$checksum"; do
            name="$(basename "$asset")"
            if gh release view "$tag" --json assets --jq '.assets[].name' | grep -Fqx -- "$name"; then
              if ! verify_uploaded_asset "$asset"; then
                [[ "$is_draft" == 'true' ]] || {
                  echo "Immutable release $tag contains a divergent asset" >&2
                  exit 1
                }
                gh release delete-asset "$tag" "$name" --yes
                gh release upload "$tag" "$asset"
                verify_uploaded_asset "$asset"
              fi
            else
              [[ "$is_draft" == 'true' ]] || {
                echo "Immutable release $tag is missing $name" >&2
                exit 1
              }
              gh release upload "$tag" "$asset"
              verify_uploaded_asset "$asset"
            fi
          done

          if [[ "$is_draft" == 'true' ]]; then
            if [[ "${{ steps.release.outputs.stable }}" == 'true' ]]; then
              gh release edit "$tag" --draft=false --latest
            else
              gh release edit "$tag" --draft=false
            fi
          fi

          immutable=false
          for attempt in 1 2 3 4 5; do
            release_state="$(gh release view "$tag" --json isDraft,isImmutable --jq '[.isDraft,.isImmutable] | @tsv')"
            is_draft="${release_state%%$'\t'*}"
            is_immutable="${release_state##*$'\t'}"
            if [[ "$is_draft" == 'false' && "$is_immutable" == 'true' ]]; then
              immutable=true
              break
            fi
            sleep "$((attempt * 3))"
          done
          if [[ "$immutable" != 'true' ]]; then
            # With the policy accidentally disabled, minimize exposure: return
            # the still-mutable release to draft before failing. Immutable
            # releases cannot be changed and therefore never enter this branch.
            if [[ "$is_draft" == 'false' && "$is_immutable" != 'true' ]]; then
              gh release edit "$tag" --draft
            fi
            echo "Release $tag did not become immutable; rolling tags were not promoted" >&2
            exit 1
          fi

          for attempt in 1 2 3 4 5; do
            if gh release verify "$tag" >/dev/null \
              && gh release verify-asset "$tag" "$archive" >/dev/null \
              && gh release verify-asset "$tag" "$checksum" >/dev/null; then
              exit 0
            fi
            sleep "$((attempt * 3))"
          done
          echo "Published release $tag is not verifiably immutable" >&2
          exit 1

      - name: Promote rolling tags only after the immutable release is verified
        if: steps.release.outputs.stable == 'true'
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          digest="${{ steps.image.outputs.digest }}"

          inspect_digest() {
            local manifest
            manifest="$(docker buildx imagetools inspect "$1" --format '{{json .Manifest}}' 2>/dev/null)" || return 1
            jq -er '.digest | select(type == "string" and test("^sha256:[0-9a-f]{64}$"))' <<< "$manifest"
          }
          promote() {
            local tag="$1" current
            if current="$(inspect_digest "$image:$tag")" && [[ "$current" == "$digest" ]]; then
              return 0
            fi
            docker buildx imagetools create --tag "$image:$tag" "$image@$digest"
            current="$(inspect_digest "$image:$tag")"
            test "$current" = "$digest" || {
              echo "$image:$tag resolved to $current after promotion, expected $digest" >&2
              exit 1
            }
          }

          promote "${{ steps.release.outputs.minor }}"
          promote latest
